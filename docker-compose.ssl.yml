# Produção (VPS Linux com Let's Encrypt no host):
#   docker compose -f docker-compose.ssl.yml up -d --build
#
# Requisitos: Apache parado; certificados em
#   /etc/letsencrypt/live/80.32.109.208.host.secureserver.net/
# Ajuste docker/nginx/ssl/production.conf se o FQDN mudar.

services:

  php:
    restart: unless-stopped
    networks:
      - skynet-network
    container_name: skynet-php
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf

  nginx:
    restart: unless-stopped
    networks:
      - skynet-network
    container_name: skynet-nginx
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/ssl/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - php

networks:
  skynet-network:
    driver: bridge
