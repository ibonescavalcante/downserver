[www]
; Usuário e grupo do processo PHP-FPM
user = www-data
group = www-data
; PHP-FPM vai escutar na porta 9000 (para o Nginx conectar via fastcgi)
listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
; =======================================================
; GERENCIAMENTO DE PROCESSOS (ajustado para 12 cores / 8GB)
; =======================================================
pm = dynamic
; Máximo de processos filhos simultâneos
pm.max_children = 240          ; ~4 por core → seguro para 18GB RAM
; Número de processos inicializados no start
pm.start_servers = 24         ; ~1 por core
; Mínimo e máximo de processos ociosos
pm.min_spare_servers = 12
pm.max_spare_servers = 60
; Máximo de requisições que cada processo trata antes de ser reiniciado
pm.max_requests = 500
; =======================================================
; LOGS E DEBUG
; =======================================================
; Log de acesso (vai para stdout do container → docker logs)
access.log = /proc/self/fd/2
; Log de requisições lentas
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s
; Mostrar stacktrace no slowlog
request_slowlog_trace_depth = 20
; =======================================================
; LIMITES DE RECURSOS
; =======================================================
; Tempo máximo de execução de uma requisição
request_terminate_timeout = 120s
; Máximo de arquivos abertos por worker
rlimit_files = 1024
; Máximo de memória para cada processo (controlado também no php.ini)
; memory_limit está em local.ini → mantenha 512M lá
; =======================================================
; OUTROS
; =======================================================
; Status do pool (útil para monitorar)
pm.status_path = /status
; ping de saúde
ping.path = /ping
ping.response = pong
; Enviar erros para stderr (docker logs pega)
catch_workers_output = yes