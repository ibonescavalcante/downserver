# Produção: HTTP (ACME + redirect) + HTTPS
# Usado apenas com docker-compose.ssl.yml (certificados em /etc/letsencrypt no host)

server {
    listen 80;
    server_name 80.32.109.208.host.secureserver.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/public;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name 80.32.109.208.host.secureserver.net;

    ssl_certificate /etc/letsencrypt/live/80.32.109.208.host.secureserver.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/80.32.109.208.host.secureserver.net/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    include /etc/nginx/snippets/app-common.conf;
}
